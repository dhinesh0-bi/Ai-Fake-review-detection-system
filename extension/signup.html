<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustGuard Sign Up</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="header">
            <h2>🛡️ Join TrustGuard</h2>
            <p>Create a free account to secure your browsing.</p>
        </div>

        <form id="signup-form">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password (Min 6 characters)</label>
                <input type="password" id="password" placeholder="••••••••" required minlength="6">
            </div>

            <button type="submit" id="signup-btn" class="btn-primary">
                <span id="btn-text">Create Account</span>
                <span id="btn-spinner" class="hidden">↻</span>
            </button>
        </form>

        <div id="status-message" class="hidden"></div>

        <div class="footer">
            <p>Already have an account? <a href="login.html">Log In here</a></p>
        </div>
    </div>
    <script src="signup.js"></script>
</body>
</html>
