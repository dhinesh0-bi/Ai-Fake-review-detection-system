<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustGuard Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="width: 320px; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa;">
    
    <div style="text-align: center;">
        <h2>🛡️ TrustGuard</h2>
        <p style="color: #4CAF50; font-weight: bold;">Status: Active & Scanning</p>
    </div>

    <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">

    <div>
        <h4 style="margin-bottom: 5px;">Welcome back!</h4>
        <p style="font-size: 12px; color: #666;">Your extension is actively protecting you from AI-generated opinion spam on supported e-commerce sites.</p>
    </div>

    <button id="logout-btn" style="width: 100%; margin-top: 20px; padding: 10px; background-color: #ff4d4d; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">
        Log Out
    </button>

    <script src="dashboard.js"></script>
</body>
</html>
